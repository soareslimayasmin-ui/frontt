<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTech - Triagem e Pré-Atendimento</title>
    <style>
        /* Paleta de Cores Frias e Profissionais */
        :root {
            --bg-principal: #eef2f7;      /* Cinza azulado bem claro */
            --azul-escuro: #1b2a47;       /* Azul petróleo / Navy (Seriedade) */
            --azul-clinico: #3a86c8;      /* Azul tecnologia / Saúde */
            --azul-suave: #dbe9f6;        /* Fundo de destaque frio */
            --texto-escuro: #2c3e50;      /* Texto de fácil leitura */
            --branco: #ffffff;
            --alerta-frio: #4a5568;       /* Cinza ardósia para avisos */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-escuro);
            line-height: 1.6;
        }

        /* Cabeçalho */
        header {
            background-color: var(--azul-escuro);
            color: var(--branco);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 4px solid var(--azul-clinico);
        }

        header h1 {
            font-size: 26px;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 14px;
            color: #a0aec0;
            margin-top: 5px;
        }

        /* Container do Conteúdo */
        .container {
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Card do Formulário */
        .card-triagem {
            background-color: var(--branco);
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(27, 42, 71, 0.08);
        }

        .card-triagem h2 {
            color: var(--azul-escuro);
            font-size: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Grupos do Formulário */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--azul-escuro);
            font-size: 14px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            font-size: 15px;
            color: var(--texto-escuro);
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--azul-clinico);
            background-color: var(--branco);
            outline: none;
        }

        textarea {
            resize: vertical;
            height: 130px;
        }
